<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>تحميل تطبيق رواحل</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #07070f;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Cairo', sans-serif;
      color: #fff;
      padding: 24px;
      gap: 32px;
    }

    .logo {
      font-size: 38px;
      font-weight: 900;
      letter-spacing: -1px;
      background: linear-gradient(135deg, #a78bfa, #6a5ae0);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      font-size: 15px;
      color: #94a3b8;
      text-align: center;
      line-height: 1.7;
      max-width: 300px;
    }

    .btn-download {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 18px 44px;
      border-radius: 100px;
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: #fff;
      font-family: 'Cairo', sans-serif;
      font-size: 18px;
      font-weight: 900;
      text-decoration: none;
      box-shadow: 0 6px 32px rgba(34,197,94,0.45);
      transition: all 0.25s;
    }
    .btn-download:hover { transform: translateY(-3px); box-shadow: 0 12px 40px rgba(34,197,94,0.6); }
    .btn-download:active { transform: translateY(0); }

    .note {
      font-size: 12px;
      color: #475569;
      text-align: center;
    }

    .divider {
      width: 60px;
      height: 2px;
      background: linear-gradient(90deg, #a78bfa, #6a5ae0);
      border-radius: 2px;
      opacity: 0.4;
    }
  </style>
</head>
<body>
  <div class="logo">رواحل 🚚</div>
  <div class="subtitle">تطبيق إدارة المناديب — حمّل التطبيق على أندرويد وابدأ فوراً</div>
  <div class="divider"></div>
  <a class="btn-download" href="https://drive.google.com/uc?export=download&id=1xNghNXXVu1HXhE-JxRTtp48pH4py-i9v">
    ⬇️ تحميل التطبيق
  </a>
  <div class="note">Android APK — بعد التحميل افتح الملف وثبّت</div>
</body>
</html>
