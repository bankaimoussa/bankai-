<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#07070f">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Rwa7el">
<link rel="manifest" href="/manifest.json">
<title>Rwa7el - مندوب</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Cairo:wght@400;500;600;700;800;900&display=swap');

  /* ===== TOKENS ===== */
  :root {
    --bg: #07070f;
    --bg2: #0f0f1a;
    --surface: rgba(20, 20, 35, 0.75);
    --surface2: rgba(30, 30, 50, 0.9);
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --primary: #7c6af7;
    --primary-glow: rgba(124,106,247,0.35);
    --success: #0fd4c8;
    --success-glow: rgba(15,212,200,0.3);
    --warning: #f5a623;
    --warning-glow: rgba(245,166,35,0.3);
    --danger: #f4566a;
    --break-c: #b8aaff;
    --break-glow: rgba(184,170,255,0.3);
    --text: #eeeef5;
    --text-muted: #7878a0;
    --text-dim: #4a4a6a;
    --radius: 22px;
    --radius-sm: 14px;
    --shadow: 0 20px 60px rgba(0,0,0,0.6);
    --font: 'Outfit', 'Cairo', sans-serif;

    /* state accent (يتغير حسب الحالة) */
    --accent: var(--primary);
    --accent-glow: var(--primary-glow);
  }

  /* ===== LIGHT THEME ===== */
  [data-theme="light"] {
    --bg: #f2f2fb;
    --bg2: #e8e8f5;
    --surface: rgba(255,255,255,0.92);
    --surface2: rgba(245,245,255,0.98);
    --border: rgba(0,0,0,0.07);
    --border2: rgba(0,0,0,0.13);
    --text: #12122a;
    --text-muted: #555578;
    --text-dim: #9999bb;
    --shadow: 0 20px 60px rgba(0,0,0,0.1);
  }
  [data-theme="light"] .bg-canvas {
    background-image:
      linear-gradient(rgba(124,106,247,0.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(124,106,247,0.06) 1px, transparent 1px);
  }
  [data-theme="light"] .orb { opacity: 0.2; }
  [data-theme="light"] #splash { background: var(--bg); }
  [data-theme="light"] .login-card input {
    background: rgba(0,0,0,0.04);
    color: var(--text);
  }
  [data-theme="light"] .gps-card { background: rgba(0,0,0,0.03); }
  [data-theme="light"] .stat-row { background: rgba(0,0,0,0.04); border-color: rgba(0,0,0,0.07); }
  [data-theme="light"] .info-tile { background: rgba(0,0,0,0.03); }

  /* ===== RESET ===== */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* ===== BACKGROUND ===== */
  .bg-canvas {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background-image:
      linear-gradient(rgba(124,106,247,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(124,106,247,0.04) 1px, transparent 1px);
    background-size: 48px 48px;
    animation: gridDrift 30s linear infinite;
  }
  @keyframes gridDrift { to { transform: translate(48px, 48px); } }

  .orb {
    position: fixed; border-radius: 50%; pointer-events: none; z-index: 0;
    filter: blur(80px); opacity: 0.35;
    animation: orbFloat 8s ease-in-out infinite alternate;
  }
  .orb-1 { width: 320px; height: 320px; background: var(--primary); top: -80px; right: -60px; animation-delay: 0s; }
  .orb-2 { width: 240px; height: 240px; background: var(--success); bottom: -60px; left: -40px; animation-delay: -3s; }
  @keyframes orbFloat { from { transform: translate(0,0) scale(1); } to { transform: translate(20px, 30px) scale(1.1); } }

  /* ===== SPLASH ===== */
  #splash {
    position: fixed; inset: 0; background: var(--bg);
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    z-index: 9999; transition: opacity 1s ease;
  }
  .splash-logo {
    font-size: 48px; font-weight: 900; letter-spacing: -2px;
    background: linear-gradient(135deg, #fff 30%, var(--primary));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    animation: splashPop 0.6s cubic-bezier(0.34,1.56,0.64,1);
  }
  [data-theme="light"] .splash-logo {
    background: linear-gradient(135deg, #12122a 30%, var(--primary));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .splash-sub {
    color: var(--text-muted); font-size: 11px; letter-spacing: 6px;
    margin-top: 10px; text-transform: uppercase; font-weight: 600;
    animation: fadeIn 0.8s ease 0.3s both;
  }
  @keyframes splashPop { from { transform: scale(0.6); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  /* ===== THEME TOGGLE ===== */
  .theme-pill {
    position: fixed; top: 16px; right: 16px; z-index: 10000;
    display: flex; align-items: center; gap: 6px;
    padding: 7px 14px 7px 10px;
    background: var(--surface2); border: 1px solid var(--border2);
    border-radius: 100px; cursor: pointer;
    backdrop-filter: blur(16px);
    box-shadow: 0 4px 20px rgba(0,0,0,0.25);
    transition: all 0.25s ease;
    font-family: var(--font); font-size: 13px; font-weight: 600;
    color: var(--text);
  }
  .theme-pill:hover { transform: scale(1.05); box-shadow: 0 6px 28px rgba(0,0,0,0.35); }
  .theme-pill .pill-icon { font-size: 15px; line-height: 1; }
  .theme-pill .pill-label { font-size: 12px; font-weight: 700; }

  /* ===== TOAST ===== */
  #toast-container {
    position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 10001;
    display: flex; flex-direction: column; align-items: center; gap: 8px;
  }
  .toast {
    background: var(--surface2); color: var(--text);
    padding: 10px 22px; border-radius: 100px;
    font-weight: 700; font-size: 13px;
    box-shadow: var(--shadow); border: 1px solid var(--border2);
    backdrop-filter: blur(20px);
    animation: toastIn 0.35s cubic-bezier(0.34,1.56,0.64,1) forwards;
    white-space: nowrap;
  }
  @keyframes toastIn { from { transform: translateY(-16px) scale(0.92); opacity: 0; } to { transform: none; opacity: 1; } }

  /* ===== CONTAINER ===== */
  .container {
    width: 100%; max-width: 420px; padding: 20px; z-index: 10;
    display: none; animation: slideUp 0.5s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes slideUp { from { opacity: 0; transform: translateY(32px) scale(0.97); } to { opacity: 1; transform: none; } }

  /* ===== LOGIN CARD ===== */
  .login-card {
    background: var(--surface); border: 1px solid var(--border2);
    border-radius: var(--radius); padding: 36px 28px;
    backdrop-filter: blur(24px); box-shadow: var(--shadow);
  }
  .login-brand {
    font-size: 30px; font-weight: 900; letter-spacing: -1px;
    background: linear-gradient(135deg, var(--text) 40%, var(--primary));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    margin-bottom: 4px;
  }
  .login-sub { color: var(--text-muted); font-size: 13px; margin-bottom: 28px; font-weight: 500; }
  .login-card input {
    width: 100%; padding: 16px 18px; border-radius: 14px;
    border: 1.5px solid var(--border2);
    background: rgba(255,255,255,0.04);
    color: var(--text); font-size: 16px; text-align: center;
    font-family: var(--font); font-weight: 600;
    transition: border-color 0.25s, box-shadow 0.25s;
    outline: none;
  }
  .login-card input::placeholder { color: var(--text-dim); font-weight: 400; }
  .login-card input:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 4px var(--primary-glow);
  }
  .btn-connect {
    margin-top: 16px; width: 100%; padding: 16px;
    background: linear-gradient(135deg, var(--primary), #5b4fd4);
    color: #fff; font-size: 15px; font-weight: 800;
    border: none; border-radius: 14px; cursor: pointer;
    font-family: var(--font); letter-spacing: 0.3px;
    box-shadow: 0 8px 32px var(--primary-glow);
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .btn-connect:hover { transform: translateY(-2px); box-shadow: 0 12px 40px var(--primary-glow); }
  .btn-connect:active { transform: scale(0.98); }

  /* ===== APP SCREEN ===== */
  #app-screen .container-inner {
    background: var(--surface); border: 1px solid var(--border2);
    border-radius: var(--radius); overflow: hidden;
    backdrop-filter: blur(24px); box-shadow: var(--shadow);
  }

  /* Top bar */
  .app-topbar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 18px 20px 16px;
    border-bottom: 1px solid var(--border);
  }
  .driver-label {
    font-size: 16px; font-weight: 700; display: flex; align-items: center; gap: 8px;
  }
  .driver-dot {
    width: 9px; height: 9px; border-radius: 50%; background: var(--success);
    box-shadow: 0 0 10px var(--success);
    animation: dotPulse 2s ease-in-out infinite;
  }
  @keyframes dotPulse { 0%,100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(0.7); } }

  .state-chip {
    padding: 6px 16px; border-radius: 100px;
    font-size: 11px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase;
    transition: all 0.4s ease;
  }
  .state-waiting { background: rgba(124,106,247,0.15); color: var(--primary); border: 1px solid rgba(124,106,247,0.25); }
  .state-out     { background: rgba(245,166,35,0.15);  color: var(--warning); border: 1px solid rgba(245,166,35,0.25); }
  .state-break   { background: rgba(184,170,255,0.15); color: var(--break-c); border: 1px solid rgba(184,170,255,0.25); }

  /* Hero block — الجزء الرئيسي */
  .hero-block {
    position: relative; padding: 32px 20px 24px;
    display: flex; flex-direction: column; align-items: center;
    overflow: hidden;
  }
  .hero-bg-ring {
    position: absolute; inset: 0; pointer-events: none;
    background: radial-gradient(ellipse 70% 60% at 50% 0%, var(--accent-glow), transparent 70%);
    transition: background 0.6s ease;
  }

  /* الرقم الكبير */
  .hero-number {
    font-size: 92px; font-weight: 900; line-height: 1;
    letter-spacing: -4px;
    background: linear-gradient(160deg, #fff 40%, var(--accent));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    transition: background 0.5s ease;
    position: relative; z-index: 1;
  }
  [data-theme="light"] .hero-number {
    background: linear-gradient(160deg, #12122a 40%, var(--accent));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .hero-label {
    font-size: 10px; font-weight: 700; letter-spacing: 3px;
    text-transform: uppercase; color: var(--text-muted);
    margin-top: 6px; margin-bottom: 24px;
    position: relative; z-index: 1;
  }

  /* ===== GPS + BATTERY CARDS ===== */
  .info-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
    padding: 0 18px 16px;
    position: relative; z-index: 1;
  }
  .info-tile {
    background: rgba(255,255,255,0.04); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 14px 12px;
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    transition: all 0.3s ease;
  }
  .info-tile.active-gps { border-color: rgba(15,212,200,0.25); background: rgba(15,212,200,0.06); }
  .info-tile.active-bat { border-color: rgba(124,106,247,0.25); background: rgba(124,106,247,0.06); }
  .info-tile.warn { border-color: rgba(245,166,35,0.25); background: rgba(245,166,35,0.06); }
  .info-tile.danger { border-color: rgba(244,86,106,0.25); background: rgba(244,86,106,0.06); }

  .info-icon {
    font-size: 22px; line-height: 1;
  }
  .info-value {
    font-size: 22px; font-weight: 800; line-height: 1; color: var(--text);
    letter-spacing: -0.5px;
  }
  .info-value.small { font-size: 16px; }
  .info-label {
    font-size: 9px; font-weight: 700; color: var(--text-muted);
    letter-spacing: 1.5px; text-transform: uppercase;
  }

  /* GPS detail row */
  .gps-detail {
    display: flex; justify-content: center; gap: 16px;
    padding: 0 18px 18px;
    position: relative; z-index: 1;
  }
  .gps-detail-item {
    display: flex; align-items: center; gap: 5px;
    font-size: 11px; font-weight: 600; color: var(--text-muted);
  }
  .gps-detail-item strong { color: var(--text); font-weight: 700; }

  /* GPS pill (status) */
  .gps-pill {
    display: flex; align-items: center; gap: 8px;
    padding: 9px 18px; border-radius: 100px;
    background: rgba(255,255,255,0.05); border: 1px solid var(--border2);
    font-size: 12px; font-weight: 700; color: var(--text-muted);
    width: calc(100% - 36px); justify-content: center;
    margin: 0 18px 16px;
    transition: all 0.3s ease;
    position: relative; z-index: 1;
  }
  .gps-pill.at-branch { color: var(--success); background: rgba(15,212,200,0.08); border-color: rgba(15,212,200,0.2); }
  .gps-pill.away { color: var(--text-muted); }

  /* Stats row */
  .stat-row {
    display: flex; gap: 8px;
    padding: 14px 18px;
    border-top: 1px solid var(--border);
  }
  .stat-item {
    flex: 1; text-align: center;
    background: rgba(255,255,255,0.03); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 12px 6px;
  }
  .stat-val { font-size: 22px; font-weight: 800; color: var(--text); line-height: 1; }
  .stat-lbl { font-size: 9px; font-weight: 700; color: var(--text-muted); letter-spacing: 1.5px; text-transform: uppercase; margin-top: 4px; }

  /* Break timer */
  .break-hero {
    font-size: 68px; font-weight: 900; letter-spacing: -3px; line-height: 1;
    background: linear-gradient(135deg, var(--break-c), #fff);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    position: relative; z-index: 1;
    transition: all 0.3s;
  }
  .break-hero.urgent {
    background: linear-gradient(135deg, var(--danger), #ffaa00);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    animation: urgentPulse 1s ease-in-out infinite;
  }
  @keyframes urgentPulse { 0%,100% { opacity: 1; } 50% { opacity: 0.7; } }

  /* Waiting message */
  .wait-msg {
    padding: 14px 18px 18px; text-align: center;
    color: var(--text-muted); font-size: 13px; font-weight: 500; line-height: 1.5;
    border-top: 1px solid var(--border);
  }
  .wait-msg span { color: var(--text); font-weight: 700; }

  /* Action button */
  .btn-action-big {
    margin: 0 18px 18px; width: calc(100% - 36px);
    padding: 16px; border-radius: 14px; border: none;
    font-size: 15px; font-weight: 800; cursor: pointer;
    font-family: var(--font); letter-spacing: 0.3px;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .btn-action-big:hover { transform: translateY(-2px); }
  .btn-action-big:active { transform: scale(0.98); }
  .btn-return-queue {
    background: rgba(15,212,200,0.12); color: var(--success);
    border: 1.5px solid rgba(15,212,200,0.3);
    box-shadow: 0 4px 20px rgba(15,212,200,0.1);
  }
  .btn-return-queue:hover { background: rgba(15,212,200,0.2); box-shadow: 0 8px 28px rgba(15,212,200,0.2); }
  .btn-end-break {
    background: rgba(184,170,255,0.12); color: var(--break-c);
    border: 1.5px solid rgba(184,170,255,0.3);
    box-shadow: 0 4px 20px rgba(184,170,255,0.1);
  }
  .btn-end-break:hover { background: rgba(184,170,255,0.2); }

  /* Background status indicator */
  .bg-status {
    position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
    z-index: 10000; display: flex; align-items: center; gap: 6px;
    padding: 6px 14px; border-radius: 100px;
    background: var(--surface2); border: 1px solid var(--border2);
    font-size: 10px; font-weight: 700; color: var(--text-muted);
    backdrop-filter: blur(16px); box-shadow: 0 4px 20px rgba(0,0,0,0.2);
    letter-spacing: 0.5px;
  }
  .bg-status.active { color: var(--success); border-color: rgba(15,212,200,0.25); }
  .bg-status .bg-dot {
    width: 6px; height: 6px; border-radius: 50%; background: var(--text-muted);
  }
  .bg-status.active .bg-dot { background: var(--success); box-shadow: 0 0 6px var(--success); animation: dotPulse 2s ease-in-out infinite; }

  .btn-install {
    width: 100%; padding: 13px; border-radius: 14px; border: 1.5px solid rgba(15,212,200,0.35);
    background: rgba(15,212,200,0.08); color: var(--success);
    font-size: 14px; font-weight: 700; cursor: pointer; margin-top: 10px;
    font-family: 'Cairo', sans-serif; transition: 0.2s;
  }
  .btn-install:hover { background: rgba(15,212,200,0.15); }
  .btn-end-shift { width:34px; height:34px; border-radius:10px; border:1px solid rgba(239,68,68,0.35); background:rgba(239,68,68,0.1); color:#ef4444; font-size:14px; cursor:pointer; transition:all 0.2s; display:flex; align-items:center; justify-content:center; }
  .btn-end-shift:active { background:rgba(239,68,68,0.25); transform:scale(0.92); }
  #chat-popup.show { transform:translateX(-50%) translateY(0); opacity:1; pointer-events:auto; }
</style>
</head>
<body>

<div class="bg-canvas"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<!-- Theme toggle -->
<button class="theme-pill" id="theme-toggle" onclick="toggleTheme()">
  <span class="pill-icon" id="theme-icon">☀️</span>
  <span class="pill-label" id="theme-label">فاتح</span>
</button>

<!-- Splash -->
<div id="splash">
  <div class="splash-logo">Rwa7el</div>
  <div class="splash-sub">BANKAI</div>
</div>

<div id="toast-container"></div>

<!-- Background keep-alive status -->
<div class="bg-status" id="bg-status" style="display:none">
  <div class="bg-dot"></div>
  <span id="bg-status-text">خلفية نشطة</span>
</div>

<!-- LOGIN -->
<div class="container" id="login-screen">
  <div class="login-card">
    <div class="login-brand">Rwa7el 🚚</div>
    <div class="login-sub" id="login-sub">ادخل اسمك وابدأ شغل</div>
    <input type="text" id="name" placeholder="اسم المندوب" autocomplete="off">
    <button class="btn-connect" id="btn-start-shift" onclick="join()">🟢 ابدأ الشيفت</button>
    <button class="btn-install" id="btn-install" style="display:none" onclick="installPWA()">📲 ثبّت التطبيق على موبايلك</button>
  </div>
</div>

<!-- APP -->
<div class="container" id="app-screen">
  <div class="container-inner">

    <!-- Top bar -->
    <div class="app-topbar">
      <div class="driver-label">
        <div class="driver-dot" id="driver-dot"></div>
        <span id="driver-name">مندوب</span>
      </div>
      <div style="display:flex;align-items:center;gap:8px;">
        <div class="state-chip state-waiting" id="state-chip">انتظار</div>
        <button class="btn-end-shift" onclick="confirmEndShift()" title="إنهاء الشيفت">⏹</button>
      </div>
    </div>

    <!-- Hero -->
    <div class="hero-block" id="hero-block">
      <div class="hero-bg-ring" id="hero-bg"></div>

      <!-- Waiting state -->
      <div id="view-waiting">
        <div style="text-align:center">
          <div class="hero-number" id="pos-num">--</div>
          <div class="hero-label">ترتيبك في الطابور</div>
        </div>
      </div>

      <!-- Out state -->
      <div id="view-out" style="display:none; text-align:center">
        <div class="hero-number" style="font-size:76px; letter-spacing:-2px;">🚀</div>
        <div class="hero-label">في الطريق</div>
      </div>

      <!-- Break state -->
      <div id="view-break" style="display:none; text-align:center">
        <div class="break-hero" id="break-timer">60:00</div>
        <div class="hero-label" style="color: var(--break-c);">وقت الراحة</div>
      </div>
    </div>

    <!-- GPS + Battery info tiles -->
    <div class="info-grid">
      <div class="info-tile" id="gps-tile">
        <div class="info-icon">📍</div>
        <div class="info-value small" id="gps-distance">--</div>
        <div class="info-label">المسافة</div>
      </div>
      <div class="info-tile" id="bat-tile">
        <div class="info-icon" id="bat-icon">🔋</div>
        <div class="info-value" id="bat-percent">--%</div>
        <div class="info-label">البطارية</div>
      </div>
    </div>

    <!-- GPS detail (speed + accuracy) -->
    <div class="gps-detail">
      <div class="gps-detail-item">⚡ <strong id="gps-speed">0</strong> كم/س</div>
      <div class="gps-detail-item">🎯 <strong id="gps-accuracy">--</strong> م</div>
    </div>

    <!-- GPS status pill -->

    </div>

    <!-- Stats -->
    <div class="stat-row" id="stat-row" style="display:none">
      <div class="stat-item">
        <div class="stat-val" id="stat-orders">0</div>

      </div>

        <div class="stat-val" id="stat-misses">0</div>

      </div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<script>
// ===== THEME =====
(function() {
  const saved = localStorage.getItem('rwa7el_theme') || 'dark';
  document.documentElement.setAttribute('data-theme', saved);
  updateThemeUI(saved);
})();

function updateThemeUI(theme) {
  const icon = document.getElementById('theme-icon');
  const label = document.getElementById('theme-label');
  if (!icon) return;
  if (theme === 'dark') { icon.textContent = '☀️'; label.textContent = 'فاتح'; }
  else                  { icon.textContent = '🌙'; label.textContent = 'داكن'; }
}

function toggleTheme() {
  const html = document.documentElement;
  const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  html.setAttribute('data-theme', next);
  localStorage.setItem('rwa7el_theme', next);
  updateThemeUI(next);
}

// ===== CORE =====
const WSURL = `${location.protocol === 'https:' ? 'wss' : 'ws'}://${location.host}/ws/driver`;
let ws, driverName = null, kicked = false;
let gpsWatchId = null, lastGpsPos = null;
let pingInterval = null, reconnectTimer = null;
let currentBreakEnd = null;

function showToast(msg) {
  // لو على Android والصفحة في الخلفية، متعرضش toast
  if (window.AndroidBridge && document.visibilityState === 'hidden') return;
  const c = document.getElementById('toast-container');
  const t = document.createElement('div');
  t.className = 'toast'; t.innerText = msg;
  c.appendChild(t);
  setTimeout(() => t.remove(), 4000);
}

// ===== BACKGROUND KEEP-ALIVE =====

// 1) Wake Lock API — يمنع الشاشة من النوم
let wakeLock = null;
async function requestWakeLock() {
  try {
    if ('wakeLock' in navigator) {
      if (wakeLock) return; // معندناش حاجة نعملها لو شغال
      wakeLock = await navigator.wakeLock.request('screen');
      wakeLock.addEventListener('release', () => { wakeLock = null; });
      updateBgStatus(true);
    }
  } catch(e) { /* not supported or no user gesture */ }
}

// 2) AudioContext Loop — أقوى من Audio element، صعب على المتصفح يوقفه في الخلفية
let _audioCtx = null;
function startSilentAudio() {
  if (_audioCtx) return;
  try {
    _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const oscillator = _audioCtx.createOscillator();
    const gain = _audioCtx.createGain();
    gain.gain.value = 0.00001; // صامت تماماً للأذن
    oscillator.type = 'sine';
    oscillator.frequency.value = 1; // 1Hz — مش مسموع
    oscillator.connect(gain);
    gain.connect(_audioCtx.destination);
    oscillator.start();
    // الـ oscillator مش بيوقف أبداً — ده هو الهدف
  } catch(e) {}
}

// لو المتصفح عمل suspend للـ AudioContext (ممكن يحصل على iOS)، أعد تشغيله
function resumeAudioCtx() {
  if (_audioCtx && _audioCtx.state === 'suspended') {
    _audioCtx.resume().catch(() => {});
  }
}

// 3) صوت تنبيه فعلي (مسموع) — بيستخدم نفس الـ AudioContext الموجود بدل ما يفتح واحد جديد
// ملحوظة: على iOS، لو الموبايل على وضع صامت (mute switch) أو التطبيق في الخلفية الكاملة،
// نظام التشغيل بيمنع أي صوت يخرج فعليًا — ده قيد من المتصفح/النظام مش حاجة نقدر نتخطاها برمجيًا.
// أقصى ما نقدر نضمنه: الصوت يشتغل فورًا أول ما التطبيق يرجع للـ foreground أو الشاشة تتفتح.
function playAlarm(kind) {
  try {
    resumeAudioCtx();
    if (!_audioCtx) {
      _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (_audioCtx.state === 'suspended') { _audioCtx.resume().catch(() => {}); }

    const now = _audioCtx.currentTime;
    // نغمتين متتاليتين — أوضح من نغمة واحدة وسط الضوضاء
    const freqs = kind === 'urgent' ? [880, 1046] : [660, 880];
    freqs.forEach((freq, i) => {
      const osc = _audioCtx.createOscillator();
      const gain = _audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.value = freq;
      const start = now + i * 0.18;
      gain.gain.setValueAtTime(0, start);
      gain.gain.linearRampToValueAtTime(0.35, start + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.001, start + 0.16);
      osc.connect(gain);
      gain.connect(_audioCtx.destination);
      osc.start(start);
      osc.stop(start + 0.18);
    });

    // اهتزاز كمان لو مدعوم (بيشتغل حتى لو الصوت اتمنع)
    if (navigator.vibrate) navigator.vibrate(kind === 'urgent' ? [200, 100, 200] : [150]);
  } catch (e) { /* الصوت مش أساسي — متحاولش تكسر باقي الفانكشن لو فشل */ }
}

// لو التطبيق رجع من الخلفية، شغّل الصوت الأول اللي اتفوت (لو كان فيه رسالة وصلت والشاشة مقفولة)
let _pendingAlarmOnResume = false;
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible' && _pendingAlarmOnResume) {
    _pendingAlarmOnResume = false;
    playAlarm('chat');
  }
});

function updateBgStatus(active) {
  const el = document.getElementById('bg-status');
  if (!el) return;
  el.style.display = 'flex';
  el.classList.toggle('active', active);
  document.getElementById('bg-status-text').innerText = active ? 'خلفية نشطة' : 'خلفية متوقفة';
}

// Re-request wake lock + resume audio on visibility change
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible' && driverName) {
    requestWakeLock();
    resumeAudioCtx();
  }
});

// ===== GPS =====
let gpsForceInterval = null;
let _lastSpeedCalc = null; // {lat, lng, ts} — لحساب السرعة يدويًا كـ fallback

function startGPS() {
  if (!navigator.geolocation || gpsWatchId !== null) return;
  gpsWatchId = navigator.geolocation.watchPosition(
    pos => { lastGpsPos = pos; sendLocation(pos); updateGpsDisplay(pos); },
    () => {
      document.getElementById('gps-text').innerText = 'مش قادر يحدد موقعك';
      gpsWatchId = null;
    },
    { enableHighAccuracy: true, maximumAge: 0, timeout: 15000 }
  );
  // force-send آخر موقع معروف كل 10 ثانية (مهم للخلفية)
  clearInterval(gpsForceInterval);
  gpsForceInterval = setInterval(() => {
    if (lastGpsPos) sendLocation(lastGpsPos);
    else if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(
        pos => { lastGpsPos = pos; sendLocation(pos); updateGpsDisplay(pos); },
        () => {},
        { enableHighAccuracy: true, maximumAge: 0, timeout: 10000 }
      );
    }
  }, 10000);
}

// المسافة بالمتر بين نقطتين (نفس صيغة haversine اللي في السيرفر)
function _distMeters(lat1, lng1, lat2, lng2) {
  const R = 6371000;
  const p1 = lat1 * Math.PI / 180, p2 = lat2 * Math.PI / 180;
  const dp = (lat2 - lat1) * Math.PI / 180;
  const dl = (lng2 - lng1) * Math.PI / 180;
  const a = Math.sin(dp/2)**2 + Math.cos(p1)*Math.cos(p2)*Math.sin(dl/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

// يحسب السرعة (km/h) — بيفضّل coords.speed لو موجودة ومنطقية، وإلا يحسبها يدويًا من المسافة/الزمن
function computeSpeedKmh(pos) {
  const now = pos.timestamp || Date.now();
  const lat = pos.coords.latitude, lng = pos.coords.longitude;

  let manualKmh = null;
  if (_lastSpeedCalc) {
    const dtSec = (now - _lastSpeedCalc.ts) / 1000;
    if (dtSec >= 1) {
      const distM = _distMeters(_lastSpeedCalc.lat, _lastSpeedCalc.lng, lat, lng);
      // نتجاهل الـ jitter وهو واقف (حركة أقل من 3م تتحسب صفر)
      manualKmh = distM < 3 ? 0 : (distM / dtSec) * 3.6;
    }
  }
  _lastSpeedCalc = { lat, lng, ts: now };

  // coords.speed غالبًا null أو غير دقيق على شبكات ضعيفة — نستخدمه بس لو موجود ومنطقي (<250 km/h)
  const rawKmh = pos.coords.speed != null ? pos.coords.speed * 3.6 : null;
  if (rawKmh != null && rawKmh >= 0 && rawKmh < 250) {
    // متوسط بسيط بين قراءة الـ GPS المباشرة والحساب اليدوي لتقليل التذبذب
    return manualKmh != null ? (rawKmh * 0.6 + manualKmh * 0.4) : rawKmh;
  }
  return manualKmh != null ? manualKmh : 0;
}

function sendLocation(pos) {
  if (ws && ws.readyState === WebSocket.OPEN) {
    const speedKmh = computeSpeedKmh(pos);
    ws.send(JSON.stringify({
      type: 'location',
      lat: pos.coords.latitude, lng: pos.coords.longitude,
      speed: +speedKmh.toFixed(1),
      heading: pos.coords.heading != null ? +pos.coords.heading.toFixed(1) : 0,
      accuracy: +pos.coords.accuracy.toFixed(1)
    }));
  }
}

function updateGpsDisplay(pos) {
  const speed = Math.round(computeSpeedKmh(pos));
  const acc = pos.coords.accuracy != null ? Math.round(pos.coords.accuracy) : '--';
  document.getElementById('gps-speed').innerText = speed;
  document.getElementById('gps-accuracy').innerText = acc;
}

// ===== WS =====
function startPing() {
  clearInterval(pingInterval);
  pingInterval = setInterval(() => {
    if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({type:'ping'}));
  }, 25000);
}

function connectWS() {
  if (kicked) return;
  if (ws) { try { ws.close(); } catch(e){} }
  ws = new WebSocket(WSURL);
  ws.onopen = () => {
    // بنبعت الـ lat/lng مع رسالة الـ join عشان الـ server يتأكد من المسافة
    const joinMsg = {type:'join', name: driverName};
    if (lastGpsPos) {
      joinMsg.lat = lastGpsPos.coords.latitude;
      joinMsg.lng = lastGpsPos.coords.longitude;
    }
    ws.send(JSON.stringify(joinMsg));
    startPing();
    if (lastGpsPos) sendLocation(lastGpsPos);
  };
  ws.onmessage = (e) => {
    const d = JSON.parse(e.data);
    if (d.type === 'sync') updateUI(d.me);
    else if (d.type === 'distance') {
      updateGPS(d.meters);
      if (d.shift_km !== undefined) {
        const el = document.getElementById('stat-km');
        if (el) el.innerText = d.shift_km.toFixed(1);
      }
    }
    else if (d.type === 'kicked') handleKick();
    else if (d.type === 'join_rejected') {
      // السيرفر رفض الـ join — نرجع لشاشة اللوجين
      showToast(d.msg || '❌ تم رفض التسجيل');
      stopAllServices();
      driverName = null;
      document.getElementById('login-screen').style.display = 'flex';
      document.getElementById('app-screen').style.display = 'none';
      const btn = document.getElementById('btn-start-shift');
      if (btn) { btn.disabled = false; btn.innerText = '🟢 ابدأ الشيفت'; }
    }
    else if (d.type === 'chat_message') showChatPopup(d.text);
    else if (d.type === 'force_refresh') {
      // بعت آخر موقع معروف فوراً بدون انتظار
      if (lastGpsPos) sendLocation(lastGpsPos);
      // وبعدين طلب تحديث جديد في الخلفية
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
          pos => { lastGpsPos = pos; sendLocation(pos); updateGpsDisplay(pos); },
          () => {},
          { enableHighAccuracy: true, maximumAge: 5000, timeout: 10000 }
        );
      }
      if (batteryRef && ws.readyState === WebSocket.OPEN)
        ws.send(JSON.stringify({ type: 'battery', level: batteryRef.level }));
    }
  };
  ws.onclose = () => {
    clearInterval(pingInterval);
    if (kicked) return;
    // لو على Android والـ app في الخلفية، متعملش reconnect — الـ Native Service شغال
    if (window.AndroidBridge && document.visibilityState === 'hidden') return;
    clearTimeout(reconnectTimer);
    reconnectTimer = setTimeout(connectWS, 3000);
  };
  ws.onerror = () => { try { ws.close(); } catch(e){} };
}

// === Auto-fill saved name ===
(function() {
  const savedName = localStorage.getItem('fleet_driver_name');
  if (savedName) {
    const nameInput = document.getElementById('name');
    if (nameInput) { nameInput.value = savedName; nameInput.style.display = 'none'; }
    const sub = document.getElementById('login-sub');
    if (sub) sub.textContent = 'أهلاً ' + savedName + ' 👋';
  }
})();

// إحداثيات الفرع — لازم تتطابق مع قيم الـ server
const BRANCH_LAT = 31.2071871;
const BRANCH_LNG = 29.9328765;
const MAX_JOIN_DISTANCE = 50; // متر

function haversineClient(lat1, lng1, lat2, lng2) {
  const R = 6371000;
  const p1 = lat1 * Math.PI / 180, p2 = lat2 * Math.PI / 180;
  const dp = (lat2 - lat1) * Math.PI / 180;
  const dl = (lng2 - lng1) * Math.PI / 180;
  const a = Math.sin(dp/2)**2 + Math.cos(p1)*Math.cos(p2)*Math.sin(dl/2)**2;
  return Math.round(R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
}

function join() {
  const name = document.getElementById('name').value.trim();
  if (!name) { showToast('ادخل اسمك الأول'); return; }

  if (!navigator.geolocation) {
    showToast('❌ الجهاز ده مش بيدعم GPS');
    return;
  }

  const btn = document.getElementById('btn-start-shift');
  btn.disabled = true;
  btn.innerText = '📍 بنحدد موقعك...';

  navigator.geolocation.getCurrentPosition(
    (pos) => {
      const dist = haversineClient(pos.coords.latitude, pos.coords.longitude, BRANCH_LAT, BRANCH_LNG);
      if (dist > MAX_JOIN_DISTANCE) {
        btn.disabled = false;
        btn.innerText = '🟢 ابدأ الشيفت';
        showToast(`❌ أنت بعيد عن الفرع (${dist}م) — لازم تكون في نطاق 50م`);
        return;
      }
      // ✅ قريب من الفرع — كمّل
      _doJoin(name, pos);
    },
    (err) => {
      btn.disabled = false;
      btn.innerText = '🟢 ابدأ الشيفت';
      const msgs = {1: 'رفضت إذن الموقع — لازم تسمح للتطبيق', 2: 'مش قادر يحدد موقعك دلوقتي', 3: 'انتهى وقت تحديد الموقع — حاول تاني'};
      showToast('❌ ' + (msgs[err.code] || 'خطأ في GPS'));
    },
    { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
  );
}

function _doJoin(name, pos) {
  driverName = name; kicked = false;
  localStorage.setItem('fleet_driver_name', name);
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app-screen').style.display = 'block';
  document.getElementById('driver-name').innerText = name;
  lastGpsPos = pos;
  startGPS(); trackBattery(); connectWS();
  requestWakeLock();
  startSilentAudio();
  // أبلغ الـ Android Native Service باسم السواق عشان يبدأ GPS في الخلفية
  if (window.AndroidBridge) {
    try { window.AndroidBridge.onDriverJoined(name); } catch(e) {}
  }
}

// لما الـ Android يعيد تحميل الصفحة، بيستدعي الدالة دي عشان يعيد الـ join تلقائياً
// ملحوظة: androidAutoJoin ده reconnect بعد reload — مش بيعمل check للمسافة
// لأن السواق أصلاً كان connected ومش بيعمل join جديد من الصفر
window.androidAutoJoin = function(name) {
  if (!name || driverName) return;
  document.getElementById('name').value = name;
  // reconnect بعد reload — بنتجاوز الـ proximity check
  // (السواق أصلاً كان داخل قبل كده)
  driverName = name; kicked = false;
  localStorage.setItem('fleet_driver_name', name);
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app-screen').style.display = 'block';
  document.getElementById('driver-name').innerText = name;
  startGPS(); trackBattery(); connectWS();
  requestWakeLock();
  startSilentAudio();
  if (window.AndroidBridge) {
    try { window.AndroidBridge.onDriverJoined(name); } catch(e) {}
  }
};

// === End Shift ===
function confirmEndShift() {
  document.getElementById('end-shift-overlay').style.display = 'flex';
}
function cancelEndShift() {
  document.getElementById('end-shift-overlay').style.display = 'none';
}
// === Stop everything ===
function stopAllServices() {
  clearInterval(pingInterval);
  clearTimeout(reconnectTimer);
  if (ws) try { ws.close(); } catch(e) {}
  if (navigator.geolocation && gpsWatchId !== null) {
    navigator.geolocation.clearWatch(gpsWatchId);
    gpsWatchId = null;
  }
  if (wakeLock) try { wakeLock.release(); } catch(e) {}
  driverName = null;
  lastGpsPos = null;
  if (window.AndroidBridge) {
    try { window.AndroidBridge.onDriverLeft(); } catch(e) {}
  }
}

function endShift() {
  document.getElementById('end-shift-overlay').style.display = 'none';
  stopAllServices();
  kicked = false;
  document.getElementById('app-screen').style.display = 'none';
  document.getElementById('login-screen').style.display = 'block';
}

// === Chat Notification ===
let chatPopupTimer = null;
function showChatPopup(text) {
  const popup = document.getElementById('chat-popup');
  const textEl = document.getElementById('chat-popup-text');
  const timeEl = document.getElementById('chat-popup-time');
  if (!popup || !textEl) return;
  textEl.textContent = text;
  const now = new Date();
  timeEl.textContent = now.toLocaleTimeString('ar-EG', {hour:'2-digit', minute:'2-digit'});
  popup.classList.add('show');
  if (document.visibilityState === 'visible') {
    playAlarm('chat');
  } else {
    // الشاشة مقفولة/التطبيق في الخلفية — أجّل الصوت لحد ما ترجع تتفتح
    _pendingAlarmOnResume = true;
  }
  if (chatPopupTimer) clearTimeout(chatPopupTimer);
  chatPopupTimer = setTimeout(() => popup.classList.remove('show'), 6000);
  popup.onclick = () => { popup.classList.remove('show'); clearTimeout(chatPopupTimer); };
}

function handleKick() {
  stopAllServices();
  kicked = false;
  localStorage.removeItem('fleet_driver_name');
  document.getElementById('app-screen').style.display = 'none';
  document.getElementById('login-screen').style.display = 'block';
  document.getElementById('name').value = '';
  const sub = document.getElementById('login-sub');
  if (sub) sub.textContent = 'ادخل اسمك وابدأ شغل';
  document.getElementById('name').style.display = '';
  showToast('❌ تم إزالتك من النظام');
}

// ===== UI UPDATE =====
const STATE_CONFIG = {
  Waiting: { chip: 'state-waiting', label: 'انتظار', accent: 'var(--primary)', accentGlow: 'var(--primary-glow)' },
  Out:     { chip: 'state-out',     label: 'في الطريق', accent: 'var(--warning)', accentGlow: 'var(--warning-glow)' },
  Break:   { chip: 'state-break',   label: 'راحة',    accent: 'var(--break-c)', accentGlow: 'var(--break-glow)' },
};

function updateUI(data) {
  const state = data.state;
  const cfg = STATE_CONFIG[state] || STATE_CONFIG.Waiting;
  currentBreakEnd = data.break_end;

  // state chip
  const chip = document.getElementById('state-chip');
  chip.className = `state-chip ${cfg.chip}`;
  chip.innerText = cfg.label;

  // accent CSS vars على الـ :root
  document.documentElement.style.setProperty('--accent', cfg.accent);
  document.documentElement.style.setProperty('--accent-glow', cfg.accentGlow);

  // views
  document.getElementById('view-waiting').style.display = state === 'Waiting' ? 'block' : 'none';
  document.getElementById('view-out').style.display     = state === 'Out'     ? 'block' : 'none';
  document.getElementById('view-break').style.display   = state === 'Break'   ? 'block' : 'none';

  // stats row
  document.getElementById('stat-row').style.display = 'flex';
  document.getElementById('stat-orders').innerText  = data.orders  || 0;
  document.getElementById('stat-returns').innerText = data.returns || 0;
  document.getElementById('stat-misses').innerText  = data.misses  || 0;
  document.getElementById('stat-km').innerText      = (data.shift_km || 0).toFixed(1);

  // wait msg
  document.getElementById('wait-msg').style.display = state === 'Waiting' ? 'block' : 'none';

  // action btn
  const btn = document.getElementById('btn-action');
  if (state === 'Out') {
    // المندوب في أوردر مبقاش عنده زرار يرجّع نفسه — الأدمن بس اللي بيقفل الأوردر
    btn.style.display = 'none';
  } else if (state === 'Break') {
    btn.style.display = 'block';
    btn.className = 'btn-action-big btn-end-break';
    btn.innerText = 'خلصت الراحة';
  } else {
    btn.style.display = 'none';
  }

  // waiting number
  if (state === 'Waiting') {
    const pos = data.queue_pos;
    document.getElementById('pos-num').innerText = `#${pos}`;
    if (pos === 1) confetti({ particleCount: 100, spread: 80, origin: {y: 0.6} });
  }
}

function handleAction() {
  if (ws && ws.readyState === WebSocket.OPEN)
    ws.send(JSON.stringify({type: 'change_state', state: 'Waiting'}));
}

// ===== GPS DISPLAY =====
function updateGPS(meters) {
  const pill = document.getElementById('gps-pill');
  const txt  = document.getElementById('gps-text');
  const distEl = document.getElementById('gps-distance');
  const tile = document.getElementById('gps-tile');

  let distText;
  if (meters <= 250) {
    pill.className = 'gps-pill at-branch';
    txt.innerText = `عند الفرع · ${meters}م`;
    tile.className = 'info-tile active-gps';
    distText = `${meters}م`;
  } else {
    pill.className = 'gps-pill away';
    const d = meters >= 1000 ? (meters/1000).toFixed(1)+'كم' : meters+'م';
    txt.innerText = `بعيد · ${d}`;
    tile.className = meters > 1000 ? 'info-tile warn' : 'info-tile';
    distText = d;
  }
  distEl.innerText = distText;
}

// ===== BREAK TIMER =====
setInterval(() => {
  if (!currentBreakEnd) return;
  const diff = currentBreakEnd - Math.floor(Date.now()/1000);
  const el = document.getElementById('break-timer');
  if (diff > 0) {
    const m = String(Math.floor(diff/60)).padStart(2,'0');
    const s = String(diff%60).padStart(2,'0');
    el.innerText = `${m}:${s}`;
    el.className = diff < 300 ? 'break-hero urgent' : 'break-hero';
  } else {
    el.innerText = '00:00';
    el.className = 'break-hero urgent';
  }
}, 1000);

// ===== BATTERY =====
let batteryRef = null, batteryInterval = null;

function trackBattery() {
  if (!('getBattery' in navigator)) return;
  navigator.getBattery().then(b => {
    batteryRef = b;
    const send = () => {
      if (ws && ws.readyState === WebSocket.OPEN)
        ws.send(JSON.stringify({ type: 'battery', level: b.level }));
      updateBatteryDisplay(b.level);
    };
    send();
    b.addEventListener('levelchange', send);
    // بعت البطارية كل 30 ثانية حتى لو مش اتغيرت (مهم للخلفية)
    clearInterval(batteryInterval);
    batteryInterval = setInterval(send, 30000);
  });
}

function updateBatteryDisplay(level) {
  const pct = Math.round(level * 100);
  const el = document.getElementById('bat-percent');
  const icon = document.getElementById('bat-icon');
  const tile = document.getElementById('bat-tile');
  el.innerText = `${pct}%`;

  // Battery icon based on level
  if (pct >= 80) icon.innerText = '🔋';
  else if (pct >= 50) icon.innerText = '🔋';
  else if (pct >= 20) icon.innerText = '🪫';
  else icon.innerText = '🪫';

  // Tile color based on level
  if (pct >= 50) tile.className = 'info-tile active-bat';
  else if (pct >= 20) tile.className = 'info-tile warn';
  else tile.className = 'info-tile danger';
}

// لما يتفتح التاب تاني → بعت البطارية فوراً
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible' && batteryRef && ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ type: 'battery', level: batteryRef.level }));
  }
});

// ===== VISIBILITY =====
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible' && driverName) {
    // أعد الاتصال لو انقطع
    if (!ws || ws.readyState !== WebSocket.OPEN) {
      connectWS();
    } else {
      // اطلب مزامنة فورية من السيرفر — عشان تايمر الراحة (وباقي الحالة) يبقى مظبوط
      // فوراً بعد رجوع التطبيق من الخلفية، مش مستني broadcast عشوائي
      ws.send(JSON.stringify({ type: 'resync' }));
      if (lastGpsPos) sendLocation(lastGpsPos);
    }
    // أعد تشغيل GPS لو الـ watch مات في الخلفية
    if (gpsWatchId === null) {
      startGPS();
    }
    requestWakeLock();
  }
});

// ===== SPLASH =====
setTimeout(() => {
  const s = document.getElementById('splash');
  s.style.opacity = '0';
  setTimeout(() => {
    s.style.display = 'none';
    const saved = localStorage.getItem('fleet_driver_name');
    if (saved) {
      document.getElementById('name').value = saved;
      join();
    } else {
      document.getElementById('login-screen').style.display = 'block';
    }
  }, 1000);
}, 1600);

// ===== PWA INSTALL PROMPT =====
let _installPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  _installPrompt = e;
  document.getElementById('btn-install').style.display = 'block';
});
window.addEventListener('appinstalled', () => {
  document.getElementById('btn-install').style.display = 'none';
  _installPrompt = null;
});
function installPWA() {
  if (!_installPrompt) return;
  _installPrompt.prompt();
  _installPrompt.userChoice.then(() => { _installPrompt = null; });
}

// ===== SERVICE WORKER + AUTO-UPDATE =====
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').then(reg => {
    // فحص دوري للتحديثات كل 60 ثانية
    setInterval(() => reg.update(), 60000);

    reg.addEventListener('updatefound', () => {
      const newWorker = reg.installing;
      newWorker.addEventListener('statechange', () => {
        if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
          // في نسخة جديدة جاهزة — طبّقها فوراً بدون إزعاج السواق
          newWorker.postMessage({ type: 'SKIP_WAITING' });
        }
      });
    });
  }).catch(() => {});

  // لما الـ SW الجديد يأخد control → reload الصفحة تلقائياً (بيحصل مرة واحدة بس)
  let refreshing = false;
  navigator.serviceWorker.addEventListener('controllerchange', () => {
    if (!refreshing) {
      refreshing = true;
      // لو السواق كان logged in، بيرجع تلقائياً بعد الـ reload بسبب localStorage
      window.location.reload();
    }
  });
}
</script>
